<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="JewelPulse" />
  <meta name="theme-color" content="#0F0E0A" />
  <title>JewelPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #B8860B;
      --gold-l: #D4A017;
      --gold-pale: #FFFDF0;
      --gold-dark: #7A5800;
      --ink: #0F0E0A;
      --ink-2: #2C2A22;
      --ink-3: #5A5748;
      --ink-4: #9A9789;
      --surface: #F9F7F0;
      --surface-2: #F0EDE2;
      --card: #FFFFFF;
      --border: rgba(184, 134, 11, 0.13);
      --border-2: rgba(15, 14, 10, 0.07);
      --r: 12px;
      --r-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-2);
      border-radius: 2px;
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    /* HEADER */
    header {
      background: var(--ink);
      position: sticky;
      top: 0;
      z-index: 300;
    }

    .hdr {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 14px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-gem {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .logo-text span {
      color: var(--gold-l);
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 20px;
      padding: 4px 10px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(212, 160, 23, 0.4);
      background: transparent;
      color: var(--gold-l);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .btn-add:hover {
      background: var(--gold-l);
      color: var(--ink);
    }

    .btn-add:active {
      transform: scale(.97);
    }

    .progress {
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-l), var(--gold));
      width: 0%;
      transition: width .3s ease;
    }

    /* MAIN */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 13px 13px 100px;
    }

    /* MARKET TICKER */
    .ticker-wrap {
      background: var(--ink);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 13px;
    }

    .ticker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .ticker-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-l);
    }

    .ticker-scroll {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .ticker-scroll::-webkit-scrollbar {
      display: none;
    }

    .titem {
      flex-shrink: 0;
      width: 255px;
      padding: 10px 14px;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .titem-title {
      font-size: 12.5px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 5px;
    }

    .titem-title a {
      color: inherit;
      text-decoration: none;
    }

    .titem-title a:hover {
      color: var(--gold-l);
    }

    .titem-meta {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .t-src {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.28);
      font-weight: 500;
    }

    .t-time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
    }

    .t-sep {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .ticker-ph {
      padding: 14px 14px;
      color: rgba(255, 255, 255, 0.22);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* METAL PRICES BAR */
    .metal-bar {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }

    .metal-item {
      flex: 1;
      min-width: 140px;
      padding: 8px 14px;
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .metal-item:last-child { border-right: none; }

    .metal-label {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.32);
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .metal-price {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .metal-unit {
      font-size: 9px;
      color: rgba(255,255,255,0.28);
    }

    .metal-chg {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 20px;
      margin-left: 2px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 13px;
    }

    .search-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-4);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 12px 8px 31px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-2);
      background: var(--card);
      color: var(--ink);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
    }

    .pills {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .pills::-webkit-scrollbar {
      display: none;
    }

    .pill {
      flex-shrink: 0;
      font-size: 11.5px;
      font-weight: 500;
      padding: 6px 11px;
      border-radius: 20px;
      border: 1px solid var(--border-2);
      background: var(--card);
      color: var(--ink-3);
      cursor: pointer;
      -webkit-appearance: none;
      transition: all .15s;
    }

    .pill.on {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }

    .pill:active {
      transform: scale(.96);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 12px;
    }

    /* BRAND CARD */
    .brand-card {
      background: var(--card);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      overflow: hidden;
      animation: fadeUp .35s ease both;
    }

    .card-stripe {
      height: 3px;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px 10px;
      border-bottom: 1px solid var(--border-2);
    }

    .card-avatar {
      width: 33px;
      height: 33px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 10px;
      color: var(--ink-4);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .card-count {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 20px;
      background: var(--surface-2);
      color: var(--ink-3);
    }

    .btn-crefresh {
      width: 25px;
      height: 25px;
      border-radius: 6px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .btn-crefresh:hover {
      border-color: var(--gold);
      color: var(--gold-dark);
      background: var(--gold-pale);
    }

    .btn-crefresh:active {
      transform: scale(.93);
    }

    .btn-crefresh svg.spin {
      animation: rotate .7s linear infinite;
    }

    .btn-remove {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      border: 1px solid var(--border-2);
      background: none;
      color: var(--ink-4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all .15s;
      line-height: 1;
    }

    .btn-remove:hover {
      border-color: #dc2626;
      color: #dc2626;
      background: #fef2f2;
    }

    /* SECTION TABS */
    .stabs {
      display: flex;
      border-bottom: 1px solid var(--border-2);
    }

    .stab {
      flex: 1;
      font-size: 11px;
      font-weight: 500;
      padding: 7px 4px;
      border: none;
      background: var(--surface);
      color: var(--ink-4);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .stab:hover {
      color: var(--ink-2);
    }

    .stab.on {
      color: var(--ink);
      border-bottom-color: var(--gold);
      background: var(--card);
    }

    /* CAT TABS */
    .ctabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border-2);
    }

    .ctabs::-webkit-scrollbar {
      display: none;
    }

    .ctab {
      flex-shrink: 0;
      font-size: 10.5px;
      font-weight: 500;
      padding: 6px 10px;
      border: none;
      background: none;
      color: var(--ink-4);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .ctab.on {
      color: var(--ink);
      border-bottom-color: var(--gold-l);
    }

    /* NEWS LIST */
    .nlist {
      min-height: 52px;
    }

    .ni {
      padding: 9px 13px;
      border-bottom: 1px solid var(--border-2);
      transition: background .1s;
    }

    .ni:last-of-type {
      border-bottom: none;
    }

    .ni:hover {
      background: var(--surface);
    }

    .ni-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .ni-title {
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--ink-2);
      flex: 1;
    }

    .ni-title a {
      color: inherit;
      text-decoration: none;
    }

    .ni-title a:hover {
      color: var(--gold-dark);
    }

    .ni-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .ni-src {
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-4);
    }

    .ni-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-4);
    }

    .ni-time {
      font-size: 10px;
      color: var(--ink-4);
    }

    .tag {
      display: inline-flex;
      font-size: 8.5px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 20px;
      letter-spacing: .05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .t-offer {
      background: #FEF3C7;
      color: #92400E;
    }

    .t-launch {
      background: #EDE9FE;
      color: #5B21B6;
    }

    .t-new {
      background: #DCFCE7;
      color: #166534;
    }

    .t-biz {
      background: #DBEAFE;
      color: #1E40AF;
    }

    .t-award {
      background: #FEE2E2;
      color: #991B1B;
    }

    .t-collab {
      background: #FCE7F3;
      color: #9D174D;
    }

    .t-social {
      background: #FFF7ED;
      color: #9A3412;
    }

    /* NSE ROW */
    .nse-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 13px;
      border-bottom: 1px solid var(--border-2);
      background: var(--surface);
      flex-wrap: wrap;
    }

    .nse-label {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--ink-4);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .nse-price {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    .nse-chg {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .nse-up {
      background: #dcfce7;
      color: #15803d;
    }

    .nse-dn {
      background: #fee2e2;
      color: #b91c1c;
    }

    .nse-flat {
      background: var(--surface-2);
      color: var(--ink-3);
    }

    .nse-time {
      font-size: 10px;
      color: var(--ink-4);
      margin-left: auto;
    }

    .nse-ph {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 13px;
      font-size: 12px;
      color: var(--ink-4);
      border-bottom: 1px solid var(--border-2);
      background: var(--surface);
    }

    /* OFFER ITEM */
    .offer-item {
      padding: 9px 13px;
      border-bottom: 1px solid var(--border-2);
    }

    .offer-item:last-of-type {
      border-bottom: none;
    }

    .offer-badge {
      display: inline-flex;
      font-size: 8.5px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: #FEF3C7;
      color: #92400E;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 3px;
    }

    .offer-title {
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--ink-2);
    }

    .offer-title a {
      color: inherit;
      text-decoration: none;
    }

    .offer-title a:hover {
      color: var(--gold-dark);
    }

    .offer-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 3px;
    }

    /* STATES */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 13px;
      gap: 6px;
      color: var(--ink-4);
      font-size: 12px;
      text-align: center;
    }

    .state-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 13px;
      gap: 4px;
      color: var(--ink-4);
      font-size: 12px;
      text-align: center;
    }

    .state-info .si-icon {
      font-size: 16px;
      opacity: .55;
    }

    .state-info .si-msg {
      font-size: 12px;
      color: var(--ink-3);
    }

    .state-info .si-sub {
      font-size: 10.5px;
      color: var(--ink-4);
      opacity: .8;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid var(--border-2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: rotate .7s linear infinite;
    }

    .show-more {
      display: block;
      width: 100%;
      text-align: center;
      padding: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-4);
      cursor: pointer;
      background: var(--surface);
      border: none;
      border-top: 1px solid var(--border-2);
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
    }

    .show-more:hover {
      background: var(--surface-2);
      color: var(--gold-dark);
    }

    /* ADD BRAND MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 500;
      align-items: flex-end;
      justify-content: center;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 18px 18px 0 0;
      padding: 18px 18px max(20px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 480px;
      animation: fadeUp .22s ease;
    }

    .modal-handle {
      width: 34px;
      height: 4px;
      border-radius: 2px;
      background: var(--surface-2);
      margin: 0 auto 14px;
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 12px;
    }

    .modal-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--border-2);
      background: var(--surface);
      color: var(--ink);
      outline: none;
      -webkit-appearance: none;
      margin-bottom: 8px;
      transition: border-color .2s;
    }

    .modal-input:focus {
      border-color: var(--gold);
    }

    .modal-hint {
      font-size: 11.5px;
      color: var(--ink-4);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .modal-btns {
      display: flex;
      gap: 8px;
    }

    .btn-m-add {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      border-radius: var(--r-sm);
      border: none;
      background: var(--gold);
      color: #fff;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-m-add:hover {
      background: var(--gold-dark);
    }

    .btn-m-cancel {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 16px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--ink-3);
      cursor: pointer;
    }

    /* BOTTOM NAV */
    .bnav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;

          { key: 'collab', label: 'Collabs', q: 'BlueStone jewellery celebrity ambassador' },
        ]
      },
    ];

    /* ── STATE ── */
    let BRANDS = [], results = {}, nseData = {}, offerData = {}, annData = {}, metalData = {};
    let activeSection = {}, expanded = {}, activeCat = {};
    let activeFilter = 'all', mktItems = [];
    let totalDone = 0, totalTasks = 0;

    /* ── localStorage CACHE ── */
    const CACHE_NS = 'jp_rc2_';
    const CACHE_TTL = 60 * 60 * 1000;
    function getCache(key) {
      try {
        const v = localStorage.getItem(CACHE_NS + key);
        if (!v) return null;
        const { ts, data } = JSON.parse(v);
        if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_NS + key); return null; }
        return data;
      } catch { return null; }
    }
    function setCache(key, data) {
      try {
        if (localStorage.length > 80) {
          Object.keys(localStorage).filter(k => k.startsWith(CACHE_NS)).slice(0, 10).forEach(k => localStorage.removeItem(k));
        }
        localStorage.setItem(CACHE_NS + key, JSON.stringify({ ts: Date.now(), data }));
      } catch { }
    }

    /* ── Safe fetch with AbortController ── */
    function fetchWithTimeout(url, ms = 14000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal })
        .then(res => { clearTimeout(timer); return res; })
        .catch(err => { clearTimeout(timer); throw err; });
    }

    /* ── fetchRSS — now goes through the Worker only ── */
    async function fetchRSS(query, maxAgeDays = 7) {
      const cacheKey = btoa(unescape(encodeURIComponent(query))).slice(0, 40) + '|' + maxAgeDays;
      const cached = getCache(cacheKey);
      if (cached) return cached;
      try {
        const r = await fetchWithTimeout(
          `${WORKER_URL}?q=${encodeURIComponent(query)}&days=${maxAgeDays}`,
          14000
        );
        if (!r.ok) return 'ERROR';
        const data = await r.json();
        if (!Array.isArray(data.articles)) return 'ERROR';
        setCache(cacheKey, data.articles);
        return data.articles;
      } catch { return 'ERROR'; }
    }

    /* ── fetchNSE ── */
    async function fetchNSE(id, ticker) {
      if (!ticker) { nseData[id] = null; renderNSE(id); return; }
      try {
        const r = await fetchWithTimeout(
          `${WORKER_URL}?type=nse&ticker=${encodeURIComponent(ticker)}`, 10000
        );
        if (!r.ok) throw new Error('bad status');
        const d = await r.json();
        if (!d.price) throw new Error('no price');
        const chg = d.prev ? (d.price - d.prev).toFixed(2) : null;
        const pct = d.prev ? (((d.price - d.prev) / d.prev) * 100).toFixed(2) : null;
        nseData[id] = {
          price: d.price.toFixed(2), chg, pct, ticker,
          time: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
        };
      } catch {
        nseData[id] = { err: true, ticker };
      }
      renderNSE(id);
    }

    /* ── fetchMetalPrices ── */
    async function fetchMetalPrices() {
      try {
        const r = await fetchWithTimeout(`${WORKER_URL}?type=metals`, 12000);
        if (!r.ok) throw new Error('bad status');
        const d = await r.json();
        const gold = d.gold, silver = d.silver, usdInr = d.forex?.price || 0;

        function render(elId, usdOz, label) {
          const el = document.getElementById(elId);
          if (!el) return;
          if (!usdOz || !usdInr) { el.innerHTML = `<span style="font-size:11px;color:rgba(255,255,255,.3)">Unavailable</span>`; return; }
          const multiplier = label === 'gold' ? 10 : 1000;
          const inr = (usdOz.price / 31.1035) * usdInr * multiplier;
          const chg = usdOz.prev ? ((usdOz.price - usdOz.prev) / 31.1035) * usdInr * multiplier : 0;
          const up = chg > 0, dn = chg < 0;
          const cls = up ? 'nse-up' : dn ? 'nse-dn' : 'nse-flat';
          el.innerHTML = `<span class="metal-price">₹${Math.round(inr).toLocaleString('en-IN')}</span>` +
            (chg ? `<span class="metal-chg ${cls}">${up ? '▲' : '▼'} ₹${Math.abs(Math.round(chg))}</span>` : '');
        }

        render('metal-gold', gold, 'gold');
        render('metal-silver', silver, 'silver');
        const fe = document.getElementById('metal-forex');
        if (fe) fe.textContent = usdInr ? '₹' + usdInr.toFixed(2) : '—';
      } catch {
        document.getElementById('metal-gold').innerHTML = `<span style="font-size:11px;color:rgba(255,255,255,.3)">Unavailable</span>`;
        document.getElementById('metal-silver').innerHTML = `<span style="font-size:11px;color:rgba(255,255,255,.3)">Unavailable</span>`;
      }
    }

    /* ── HELPERS ── */
    function timeAgo(iso) {
      if (!iso) return '';
      const d = Math.floor((Date.now() - new Date(iso)) / 60000);
      if (isNaN(d) || d < 0) return '';
      if (d < 1) return 'just now';
      if (d < 60) return d + 'm ago';
      if (d < 1440) return Math.floor(d / 60) + 'h ago';
      return Math.floor(d / 1440) + 'd ago';
    }

    function getTag(t) {
      t = t.toLowerCase();
      if (/offer|discount|sale|cashback|deal|festiv|making.?charge|buyback|scheme|program|programme|promo|exchange|emi|reward|loyalty|voucher|coupon|benefit|privilege|saving|gift|bonus/.test(t)) return '<span class="tag t-offer">Offer</span>';
      if (/launch|unveil|debut|introduc|release|new collection/.test(t)) return '<span class="tag t-launch">Launch</span>';
      if (/award|winner|recogni|honour/.test(t)) return '<span class="tag t-award">Award</span>';
      if (/partner|collab|ambassador|celebrity|endors/.test(t)) return '<span class="tag t-collab">Collab</span>';
      if (/revenue|profit|ipo|fund|expand|financial|result|quarter|crore|lakh|nse|bse/.test(t)) return '<span class="tag t-biz">Biz</span>';
      if (/trend|viral|campaign|social|buzz/.test(t)) return '<span class="tag t-social">Buzz</span>';
      if (/new|store|open/.test(t)) return '<span class="tag t-new">New</span>';
      return '';
    }

    function matchFilter(item) {
      if (activeFilter === 'all') return true;
      const t = item.title.toLowerCase();
      if (activeFilter === 'offer') return /offer|discount|sale|cashback|making charge/.test(t);
      if (activeFilter === 'launch') return /launch|unveil|debut|introduc|new collection/.test(t);
      if (activeFilter === 'biz') return /revenue|profit|ipo|fund|expand|financial|result|crore/.test(t);
      if (activeFilter === 'collab') return /partner|collab|ambassador|celebrity/.test(t);
      if (activeFilter === 'award') return /award|winner|recogni/.test(t);
      return true;
    }

    function isOffer(item) {
      const t = item.title.toLowerCase();
      return /offer|discount|sale|cashback|deal|festiv|making.?charge|exchange|scheme|program|programme|promo|promotion|coupon|voucher|reward|loyalty|membership|emi|instalment|installment|gift|bonus|buyback|saving|lucky draw|contest|prize|% off|no.cost|finance|plan|benefit|privilege|special|flexi/.test(t);
    }

    function randColor() {
      const c = ['#7C3AED', '#0369A1', '#065F46', '#9D174D', '#92400E', '#1E3A5F', '#3D6B21', '#C2410C'];
      return c[Math.floor(Math.random() * c.length)];
    }

    function setProgress(d, t) {
      document.getElementById('prog').style.width = t ? Math.round(d / t * 100) + '%' : '0%';
    }

    function setLive(s) {
      const dot = document.getElementById('live-dot'), txt = document.getElementById('live-txt');
      if (s === 'loading') {
        dot.style.background = '#D4A017';
        dot.style.animation = 'pulse 1.8s ease infinite';
        txt.textContent = 'Loading…';
      } else if (s === 'live') {
        dot.style.background = '#22c55e';
        dot.style.animation = 'pulse 1.8s ease infinite';
        txt.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      } else {
        dot.style.background = '#9A9789';
        dot.style.animation = 'none';
        txt.textContent = 'Ready';
      }
    }

    function renderMarket() {
      const el = document.getElementById('mkt-list'), ce = document.getElementById('mkt-count');
      if (!el) return;
      if (!mktItems.length) {
        el.innerHTML = `<div class="ticker-ph" style="color:rgba(255,255,255,.35);gap:6px">📡 <span>No market news right now — check your connection or tap ↻ Reset to reload</span></div>`;
        return;
      }
      const q = (document.getElementById('q') || {}).value || '';
      const show = q ? mktItems.filter(x => x.title.toLowerCase().includes(q.toLowerCase())) : mktItems;
      if (ce) ce.textContent = show.length + ' stories';
      el.innerHTML = show.map(item => `
        <div class="titem">
          <div class="titem-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>
          <div class="titem-meta">
            <span class="t-src">${item.source || 'News'}</span>
            ${item.publishedAt ? `<span class="t-sep"></span><span class="t-time">${timeAgo(item.publishedAt)}</span>` : ''}
          </div>
        </div>`).join('');
    }

    function renderNSE(id) {
      const el = document.getElementById('nse-' + id);
      if (!el) return;
      const d = nseData[id];
      if (d === undefined) { el.innerHTML = `<div class="nse-ph"><div class="spinner"></div>Fetching live price…</div>`; return; }
      if (d === null) { el.innerHTML = `<div class="nse-ph" style="color:var(--ink-4)">Not listed on NSE / BSE</div>`; return; }
      if (d.err) { el.innerHTML = `<div class="nse-ph" style="color:var(--ink-4)">Live price unavailable — check your connection</div>`; return; }
      const up = parseFloat(d.chg) > 0, dn = parseFloat(d.chg) < 0;
      const cls = up ? 'nse-up' : dn ? 'nse-dn' : 'nse-flat';
      const arrow = up ? '▲' : dn ? '▼' : '—';
      el.innerHTML = `<div class="nse-row">
        <span class="nse-label">NSE · ${d.ticker.replace('.NS', '')}</span>
        <span class="nse-price">₹${d.price}</span>
        <span class="nse-chg ${cls}">${arrow} ${Math.abs(d.chg)} (${d.pct}%)</span>
        <span class="nse-time">as of ${d.time}</span>
      </div>`;
    }

    function renderOffers(id) {
      const el = document.getElementById('offers-' + id);
      if (!el) return;
      const items = offerData[id];
      if (items === undefined) { el.innerHTML = `<div class="state"><div class="spinner"></div></div>`; return; }
      if (items === 'ERROR') {
        el.innerHTML = `<div class="state-info"><span class="si-icon">📡</span><span class="si-msg">Connection issue</span><span class="si-sub">Could not reach the server — check your internet and tap ↻</span></div>`;
        return;
      }
      if (!items.length) {
        el.innerHTML = `<div class="state-info"><span class="si-icon">🏷</span><span class="si-msg">No offers available right now</span><span class="si-sub">Offers are updated daily — check back soon</span></div>`;
        return;
      }
      el.innerHTML = items.map(item => `
        <div class="offer-item">
          <div class="offer-badge">🏷 Offer</div>
          <div class="offer-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>
          <div class="offer-meta">
            <span class="ni-src">${item.source || 'News'}</span>
            ${item.publishedAt ? `<span class="ni-dot"></span><span class="ni-time">${timeAgo(item.publishedAt)}</span>` : ''}
          </div>
        </div>`).join('');
    }

    function renderNews(id) {
      const raw = (results[id] || {})['all'];
      const el = document.getElementById('news-' + id);
      const ce = document.getElementById('count-' + id);
      if (!el) return;

      if (raw === undefined) {
        el.innerHTML = `<div class="nlist"><div class="state"><div class="spinner"></div></div></div>`;
        return;
      }
      if (raw === 'ERROR') {
        el.innerHTML = `<div class="nlist"><div class="state-info"><span class="si-icon">📡</span><span class="si-msg">Connection issue</span><span class="si-sub">Could not reach the server — check your internet and tap ↻</span></div></div>`;
        if (ce) ce.textContent = '—';
        return;
      }

      const q = (document.getElementById('q').value || '').toLowerCase().trim();
      const items = raw.filter(x => (!q || x.title.toLowerCase().includes(q)) && matchFilter(x));

      if (ce) {
        const all = Object.values(results[id] || {}).filter(v => Array.isArray(v)).flat();
        const uniq = [...new Map(all.map(x => [x.title, x])).values()];
        ce.textContent = uniq.length ? uniq.length + ' art.' : '0';
      }

      if (!items.length) {
        el.innerHTML = `<div class="nlist"><div class="state-info"><span class="si-icon">${raw.length ? '🔍' : '📰'}</span><span class="si-msg">${raw.length ? 'No matches for this filter' : 'No news available right now'}</span><span class="si-sub">${raw.length ? 'Try a different filter or search term' : 'News is updated continuously — tap ↻ to refresh'}</span></div></div>`;
        return;
      }

      const lim = expanded[id] ? items.length : 4;
      el.innerHTML = `<div class="nlist">` +
        items.slice(0, lim).map(item => `
        <div class="ni">
          <div class="ni-row"><div class="ni-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>${getTag(item.title)}</div>
          <div class="ni-meta"><span class="ni-src">${item.source || 'News'}</span>${item.publishedAt ? `<span class="ni-dot"></span><span class="ni-time">${timeAgo(item.publishedAt)}</span>` : ''}</div>
        </div>`).join('') +
        `</div>` +
        (items.length > 4 ? `<button class="show-more" onclick="toggleExpand('${id}')">${expanded[id] ? '↑ Show less' : '↓ ' + (items.length - 4) + ' more'}</button>` : '');
    }

    function renderAnnounce(id) {
      renderNSE(id);
      const el = document.getElementById('ann-news-' + id);
      if (!el) return;
      const items = annData[id];
      if (items === undefined) { el.innerHTML = `<div class="nlist"><div class="state"><div class="spinner"></div></div></div>`; return; }
      if (items === 'ERROR') {
        el.innerHTML = `<div class="nlist"><div class="state-info"><span class="si-icon">📡</span><span class="si-msg">Connection issue</span><span class="si-sub">Could not reach the server — check your internet and tap ↻</span></div></div>`;
        return;
      }
      if (!items.length) { el.innerHTML = `<div class="nlist"><div class="state-info"><span class="si-icon">📣</span><span class="si-msg">No announcements available right now</span><span class="si-sub">Business news is updated daily</span></div></div>`; return; }
      el.innerHTML = `<div class="nlist">` +
        items.slice(0, 5).map(item => `
        <div class="ni">
          <div class="ni-row"><div class="ni-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>${getTag(item.title)}</div>
          <div class="ni-meta"><span class="ni-src">${item.source || 'News'}</span>${item.publishedAt ? `<span class="ni-dot"></span><span class="ni-time">${timeAgo(item.publishedAt)}</span>` : ''}</div>
        </div>`).join('') +
        `</div>`;
    }

    function showSection(id, sec) {
      activeSection[id] = sec;
      ['news', 'announce', 'offers'].forEach(s => {
        const c = document.getElementById('sec-' + s + '-' + id);
        const t = document.getElementById('stab-' + s + '-' + id);
        if (c) c.style.display = s === sec ? 'block' : 'none';
        if (t) t.classList.toggle('on', s === sec);
      });
    }

    function renderCard(id) {
      const sec = activeSection[id] || 'news';
      if (sec === 'news') renderNews(id);
      else if (sec === 'announce') renderAnnounce(id);
      else renderOffers(id);
    }

    function renderAll() { renderMarket(); BRANDS.forEach(b => renderCard(b.id)); }

    function buildCardHTML(b, i) {
      return `
<div class="brand-card" id="card-${b.id}" style="animation-delay:${(i * 0.05).toFixed(2)}s">
  <div class="card-stripe" style="background:${b.color}"></div>
  <div class="card-head">
    <div class="card-avatar" style="background:${b.color}18;color:${b.color}">${b.avatar}</div>
    <div class="card-info">
      <div class="card-name">${b.name}</div>
      <div class="card-sub">${b.sub || ''}</div>
    </div>
    <div class="card-actions">
      <span class="card-count" id="count-${b.id}">—</span>
      <button class="btn-crefresh" id="rbtn-${b.id}" title="Refresh" onclick="refreshBrand('${b.id}')">
        <svg id="rico-${b.id}" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
          <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
      </button>
      <button class="btn-remove" onclick="removeBrand('${b.id}')">✕</button>
    </div>
  </div>
  <div class="stabs">
    <button class="stab" id="stab-news-${b.id}"     onclick="showSection('${b.id}','news')">📰 News</button>
    <button class="stab on"    id="stab-announce-${b.id}" onclick="showSection('${b.id}','announce')">📣 Announcements</button>
  </div>
  <div id="sec-news-${b.id}" style="display:none">
    <div id="news-${b.id}"><div class="nlist"><div class="state"><div class="spinner"></div></div></div></div>
  </div>
  <div id="sec-announce-${b.id}">
    <div id="nse-${b.id}"><div class="nse-ph"><div class="spinner"></div>Loading NSE…</div></div>
    <div id="ann-news-${b.id}"><div class="nlist"><div class="state"><div class="spinner"></div></div></div></div>
  </div>
</div>`;
    }

    async function fetchBrand(brand) {
      const id = brand.id;
      if (!results[id]) results[id] = {};
      nseData[id] = undefined;
      annData[id] = undefined;
      offerData[id] = undefined;

      const newsEl = document.getElementById('news-' + id);
      if (newsEl) newsEl.innerHTML = `<div class="nlist"><div class="state"><div class="spinner"></div></div></div>`;

      fetchNSE(id, brand.nse || null);

      const allQ = brand.queries.find(q => q.key === 'all');
      const items = allQ ? await fetchRSS(allQ.q, 30) : 'ERROR';
      results[id]['all'] = items;

      if (Array.isArray(items)) {
        offerData[id] = items.filter(isOffer);
        const annKw = /revenue|profit|ipo|fund|expan|financial|result|quarter|crore|lakh|nse|bse|store|open|appoint|partner|acquire|merger/;
        annData[id] = items.filter(x => annKw.test(x.title.toLowerCase()));
        if (!offerData[id].length) offerData[id] = [];
        if (!annData[id].length) annData[id] = items.slice(0, 5);
      } else {
        offerData[id] = items;
        annData[id] = items;
      }

      renderNews(id);
      renderOffers(id);
      renderAnnounce(id);
    }

    async function refreshBrand(id) {
      const brand = BRANDS.find(b => b.id === id);
      if (!brand) return;
      const btn = document.getElementById('rbtn-' + id);
      const ico = document.getElementById('rico-' + id);
      if (btn) btn.disabled = true;
      if (ico) ico.classList.add('spin');
      results[id] = {}; nseData[id] = undefined; annData[id] = undefined; offerData[id] = undefined; metalData = {};
      await fetchBrand(brand);
      if (btn) btn.disabled = false;
      if (ico) ico.classList.remove('spin');
    }

    async function fetchAll() {
      setLive('loading');
      results = {}; nseData = {}; annData = {}; offerData = {}; mktItems = [];
      totalDone = 0; totalTasks = 4;
      setProgress(0, totalTasks);

      BRANDS.forEach(b => {
        results[b.id] = {}; nseData[b.id] = undefined;
        annData[b.id] = undefined; offerData[b.id] = undefined;
        const el = document.getElementById('news-' + b.id);
        if (el) el.innerHTML = `<div class="nlist"><div class="state"><div class="spinner"></div></div></div>`;
        fetchNSE(b.id, b.nse || null);
      });

      const annKw = /revenue|profit|ipo|fund|expan|financial|result|quarter|crore|lakh|nse|bse|store|open|appoint|partner|acquire|merger/;

      function distribute(items, brands) {
        const pool = Array.isArray(items) ? items : [];
        brands.forEach(b => {
          const kw = b.name.split(' ')[0].toLowerCase();
          const matched = pool.filter(x => x.title.toLowerCase().includes(kw));
          const allItems = matched.length ? matched : (pool.length ? pool.slice(0, 5) : (items === 'ERROR' ? 'ERROR' : []));
          results[b.id]['all'] = allItems;
          offerData[b.id] = Array.isArray(allItems) ? allItems.filter(isOffer) : allItems;
          annData[b.id]   = Array.isArray(allItems) ? (allItems.filter(x => annKw.test(x.title.toLowerCase())) || allItems.slice(0,5)) : allItems;
          if (Array.isArray(annData[b.id]) && !annData[b.id].length) annData[b.id] = allItems.slice(0, 5);
          renderNews(b.id); renderOffers(b.id); renderAnnounce(b.id);
        });
      }

      const mktP = (async () => {
        const [r1, r2] = await Promise.all(MKT_QUERIES.map(q => fetchRSS(q)));
        const all = [...(Array.isArray(r1) ? r1 : []), ...(Array.isArray(r2) ? r2 : [])];
        const seen = new Set();
        mktItems = all.filter(x => { if (seen.has(x.title)) return false; seen.add(x.title); return true; })
          .sort((a, b) => {
            const ta = new Date(a.publishedAt).getTime() || 0;
            const tb = new Date(b.publishedAt).getTime() || 0;
            return tb - ta;
          }).slice(0, 24);
        totalDone += 2; setProgress(totalDone, totalTasks);
        renderMarket();
      })();

      const mid = Math.ceil(BRANDS.length / 2);
      const batch1 = BRANDS.slice(0, mid);
      const batch2 = BRANDS.slice(mid);
      const makeQ = bs => bs.map(b => `"${b.name}"`).join(' OR ') + ' jewellery India news';

      const brandsP = (async () => {
        const r1 = await fetchRSS(makeQ(batch1), 30);
        totalDone++; setProgress(totalDone, totalTasks);
        distribute(r1, batch1);
        const r2 = await fetchRSS(makeQ(batch2), 30);
        totalDone++; setProgress(totalDone, totalTasks);
        distribute(r2, batch2);
      })();

      await Promise.all([mktP, brandsP, fetchMetalPrices()]);
      setProgress(totalTasks, totalTasks);
      setLive('live');
      setTimeout(() => setProgress(0, 1), 2500);
    }

    /* ── ADD BRAND MODAL ── */
    function openModal() { document.getElementById('modal').classList.add('open'); setTimeout(() => document.getElementById('m-name').focus(), 100); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function addBrand() {
      const nameEl = document.getElementById('m-name');
      const name = nameEl.value.trim();
      if (!name) { nameEl.style.borderColor = '#dc2626'; return; }
      const sub = document.getElementById('m-sub').value.trim();
      const nseRaw = document.getElementById('m-nse').value.trim().toUpperCase();
      const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
      const color = randColor(), avatar = name[0].toUpperCase();
      const nb = {
        id, name, sub: sub || name, color, avatar,
        nse: nseRaw ? nseRaw + '.NS' : null,
        queries: [
          { key: 'all', label: 'All', q: `"${name}" jewellery India news` },
          { key: 'biz', label: 'Business', q: `"${name}" revenue results expansion financial` },
          { key: 'launch', label: 'Launches', q: `"${name}" new collection launch jewellery ${CY}` },
          { key: 'offer', label: 'Offers', q: `"${name}" offer scheme program discount sale cashback exchange EMI loyalty jewellery` },
          { key: 'scheme', label: 'Schemes', q: `"${name}" jewellery scheme gold saving plan benefit program India` },
          { key: 'collab', label: 'Collabs', q: `"${name}" celebrity ambassador partnership` },
        ]
      };
      BRANDS.push(nb);
      activeSection[id] = 'news';
      expanded[id] = false;
      saveAdded();
      const grid = document.getElementById('grid');
      const div = document.createElement('div');
      div.innerHTML = buildCardHTML(nb, BRANDS.length - 1);
      grid.appendChild(div.firstElementChild);
      closeModal();
      ['m-name', 'm-sub', 'm-nse'].forEach(x => {
        document.getElementById(x).value = '';
        document.getElementById(x).style.borderColor = '';
      });
      fetchBrand(nb);
    }

    /* ── removeBrand ── */
    function removeBrand(id) {
      const b = BRANDS.find(x => x.id === id);
      if (!b) return;
      const card = document.getElementById('card-' + id);
      if (!card) return;
      const existing = card.querySelector('.remove-confirm');
      if (existing) { existing.remove(); return; }
      const banner = document.createElement('div');
      banner.className = 'remove-confirm';
      banner.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#fef2f2;border-top:1px solid #fecaca;gap:8px;font-size:12px;color:#b91c1c;';
      banner.innerHTML = `<span>Remove <strong>${b.name}</strong>?</span><span style="display:flex;gap:6px"><button onclick="doRemoveBrand('${id}')" style="font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:#dc2626;color:#fff;cursor:pointer;font-family:inherit">Yes, Remove</button><button onclick="this.closest('.remove-confirm').remove()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #fecaca;background:#fff;color:#b91c1c;cursor:pointer;font-family:inherit">Cancel</button></span>`;
      card.appendChild(banner);
    }

    function doRemoveBrand(id) {
      BRANDS = BRANDS.filter(x => x.id !== id);
      const el = document.getElementById('card-' + id);
      if (el) {
        el.style.opacity = '0';
        el.style.pointerEvents = 'none';
        el.style.transform = 'scale(.96)';
        el.style.transition = 'all .2s';
        setTimeout(() => el.remove(), 200);
      }
      delete results[id];
      delete nseData[id];
      delete annData[id];
      delete offerData[id];
      delete expanded[id];
      delete activeCat[id];
      delete activeSection[id];
      saveAdded();
    }

    /* ── PERSIST CUSTOM BRANDS ── */
    function saveAdded() {
      try {
        localStorage.setItem('jp_added', JSON.stringify(
          BRANDS.filter(b => !DEFAULT_BRANDS.find(d => d.id === b.id))
        ));
      } catch { }
    }
    function loadAdded() {
      try { const s = JSON.parse(localStorage.getItem('jp_added') || '[]'); return Array.isArray(s) ? s : []; }
      catch { return []; }
    }

    function toggleExpand(id) { expanded[id] = !expanded[id]; renderNews(id); }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      renderAll();
    }

    /* ── iOS INSTALL HINT ── */
    function maybeShowIOSHint() {
      const safari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/.test(navigator.userAgent);
      const ios = /iPhone|iPad|iPod/.test(navigator.userAgent);
      const standalone = window.navigator.standalone;
      if (ios && safari && !standalone && !localStorage.getItem('jp_ios_done')) {
        const h = document.createElement('div');
        h.className = 'ios-hint';
        h.innerHTML = `<strong>💡 Add to Home Screen</strong><br>Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong> to use JewelPulse as an app — launches full screen, no browser bar, works offline.<br><button class="btn-ios-close" onclick="this.closest('.ios-hint').remove();localStorage.setItem('jp_ios_done','1')">Got it</button>`;
        document.body.appendChild(h);
      }
    }

    function clearCacheReload() {
      try {
        Object.keys(localStorage).filter(k => k.startsWith(CACHE_NS)).forEach(k => localStorage.removeItem(k));
      } catch { }
      location.reload();
    }

    /* ── INIT ── */
    (function () {
      BRANDS = [...DEFAULT_BRANDS, ...loadAdded()];
      BRANDS.forEach(b => { activeSection[b.id] = 'announce'; expanded[b.id] = false; activeCat[b.id] = 'all'; });
      document.getElementById('grid').innerHTML = BRANDS.map((b, i) => buildCardHTML(b, i)).join('');
      setTimeout(maybeShowIOSHint, 2500);
      fetchAll();
    })();
  </script>
</body>
